<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>快驴商城原型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f5f5f5;
        }
        .phone-frame {
            width: 100%;
            max-width: 430px;
            height: 100%;
            max-height: 932px;
            margin: 0 auto;
            background: #fff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .page {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background: #fff;
        }
        .page.active {
            display: block;
        }
        .page img {
            width: 100%;
            display: block;
        }
        /* 点击热区 - 第一个商品卡片 【鑫康牧场】冻 纯牛肉谷饲肥牛卷1斤/盒 */
        .hotspot-1 {
            position: absolute;
            top: 182px;
            left: 0;
            width: 100%;
            height: 200px;
            cursor: pointer;
            z-index: 10;
        }
        /* 点击热区 - 第二个商品卡片 【澳新蒙奇】冻 安格斯谷饲肥牛卷 */
        .hotspot-2 {
            position: absolute;
            top: 407px;
            left: 0;
            width: 100%;
            height: 160px;
            cursor: pointer;
            z-index: 10;
        }
        /* 点击热区 - 第三个商品卡片 【追星月】冻 A级复合雪花肥牛卷 */
        .hotspot-3 {
            position: absolute;
            top: 582px;
            left: 0;
            width: 100%;
            height: 180px;
            cursor: pointer;
            z-index: 10;
        }
        /* 返回按钮 - 只覆盖左上角箭头区域 */
        .back-btn {
            position: absolute;
            top: 44px;
            left: 0;
            width: 80px;
            height: 44px;
            cursor: pointer;
            z-index: 100;
        }
        /* 提示信息 */
        .hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 200;
            pointer-events: none;
            animation: fadeOut 3s forwards;
            animation-delay: 2s;
        }
        @keyframes fadeOut {
            to { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <!-- A页面：商品列表 -->
        <div id="pageA" class="page active">
            <img src="page-a.png" alt="商品列表">
            <div class="hotspot-1" onclick="goToPage('B')"></div>
            <div class="hotspot-2" onclick="goToPage('C')"></div>
            <div class="hotspot-3" onclick="goToPage('D')"></div>
        </div>

        <!-- B页面：第一个商品详情 -->
        <div id="pageB" class="page">
            <div class="back-btn" onclick="goToPage('A')"></div>
            <img src="page-b.png" alt="商品详情1">
        </div>

        <!-- C页面：第二个商品详情 -->
        <div id="pageC" class="page">
            <div class="back-btn" onclick="goToPage('A')"></div>
            <img src="page-c.png" alt="商品详情2">
        </div>

        <!-- D页面：第三个商品详情 -->
        <div id="pageD" class="page">
            <div class="back-btn" onclick="goToPage('A')"></div>
            <img src="page-d.png" alt="商品详情3">
        </div>
    </div>

    <div class="hint">点击前3个商品卡片进入详情，详情页顶部可返回</div>

    <script>
        function goToPage(page) {
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(p => {
                p.classList.remove('active');
            });
            // 显示目标页面
            document.getElementById('page' + page).classList.add('active');
            
            // 滚动到顶部
            setTimeout(() => {
                document.querySelector('.phone-frame .page.active').scrollTop = 0;
            }, 10);
        }
    </script>
</body>
</html>
